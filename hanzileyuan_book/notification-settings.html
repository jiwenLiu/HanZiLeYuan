<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通知设置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #1565c0 0%, #1976d2 50%, #42a5f5 100%);
        }
        .toggle-switch {
            width: 48px;
            height: 28px;
            background: rgba(255,255,255,0.3);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        .toggle-switch.active {
            background: #4ade80;
        }
        .toggle-switch::after {
            content: '';
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 12px;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }
        .toggle-switch.active::after {
            left: 22px;
        }
    </style>
</head>
<body class="w-full min-h-screen pb-8">
    <!-- 状态栏 -->
    <div class="bg-black/30 backdrop-blur-sm px-6 py-2 flex justify-between items-center text-white text-sm sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
        </div>
        <div class="font-medium">10:24</div>
        <div class="flex items-center gap-2">
            <span>85%</span>
            <i class="fas fa-battery-three-quarters"></i>
        </div>
    </div>

    <!-- 返回按钮 -->
    <div class="absolute top-14 left-8 z-20">
        <button class="bg-gradient-to-br from-yellow-400 to-orange-500 w-16 h-16 rounded-full flex items-center justify-center cursor-pointer shadow-xl hover:scale-110 transition-all" onclick="navigateTo('profile.html')">
            <i class="fas fa-arrow-left text-white text-3xl"></i>
        </button>
    </div>

    <!-- 标题 -->
    <div class="px-6 pt-24 pb-6 text-center">
        <h1 class="text-4xl font-bold text-white mb-2">🔔 通知设置</h1>
        <p class="text-white/80">管理你的通知偏好</p>
    </div>

    <!-- 设置项 -->
    <div class="px-6 space-y-4">
        <!-- 学习提醒 -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
            <div class="px-4 py-3 bg-white/5">
                <h3 class="text-white font-bold">📚 学习提醒</h3>
            </div>
            <div class="px-4 py-4 flex items-center justify-between border-b border-white/10">
                <div>
                    <h4 class="text-white font-medium">每日学习提醒</h4>
                    <p class="text-white/60 text-sm">每天20:00提醒学习</p>
                </div>
                <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
            </div>
            <div class="px-4 py-4 flex items-center justify-between">
                <div>
                    <h4 class="text-white font-medium">连续学习提醒</h4>
                    <p class="text-white/60 text-sm">连续学习断档时提醒</p>
                </div>
                <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
            </div>
        </div>

        <!-- 成就通知 -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
            <div class="px-4 py-3 bg-white/5">
                <h3 class="text-white font-bold">🏆 成就通知</h3>
            </div>
            <div class="px-4 py-4 flex items-center justify-between border-b border-white/10">
                <div>
                    <h4 class="text-white font-medium">成就解锁通知</h4>
                    <p class="text-white/60 text-sm">获得新成就时通知</p>
                </div>
                <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
            </div>
            <div class="px-4 py-4 flex items-center justify-between">
                <div>
                    <h4 class="text-white font-medium">进度提醒</h4>
                    <p class="text-white/60 text-sm">成就进度变化时提醒</p>
                </div>
                <div class="toggle-switch" onclick="toggleSwitch(this)"></div>
            </div>
        </div>

        <!-- 系统通知 -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
            <div class="px-4 py-3 bg-white/5">
                <h3 class="text-white font-bold">⚙️ 系统通知</h3>
            </div>
            <div class="px-4 py-4 flex items-center justify-between border-b border-white/10">
                <div>
                    <h4 class="text-white font-medium">更新通知</h4>
                    <p class="text-white/60 text-sm">新版本发布时通知</p>
                </div>
                <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
            </div>
            <div class="px-4 py-4 flex items-center justify-between border-b border-white/10">
                <div>
                    <h4 class="text-white font-medium">活动通知</h4>
                    <p class="text-white/60 text-sm">新活动上线时通知</p>
                </div>
                <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
            </div>
            <div class="px-4 py-4 flex items-center justify-between">
                <div>
                    <h4 class="text-white font-medium">声音提示</h4>
                    <p class="text-white/60 text-sm">通知时播放声音</p>
                </div>
                <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
            </div>
        </div>

        <!-- 勿扰模式 -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4 border border-white/20">
            <div class="flex items-center justify-between">
                <div>
                    <h4 class="text-white font-medium mb-1">🌙 勿扰模式</h4>
                    <p class="text-white/60 text-sm">22:00 - 08:00 不接收通知</p>
                </div>
                <div class="toggle-switch" onclick="toggleSwitch(this)"></div>
            </div>
        </div>
    </div>

    <script>
        function navigateTo(page) {
            window.parent.postMessage({
                action: 'navigate',
                page: page
            }, '*');
        }

        function toggleSwitch(element) {
            element.classList.toggle('active');
        }
    </script>
</body>
</html>
