<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #8b4513 0%, #a0522d 30%, #cd853f 60%, #daa520 100%);
            position: relative;
            min-height: 100vh;
        }
        
        /* 背景层 */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        /* 飘落的汉字 */
        .floating-char {
            position: absolute;
            font-size: 2.5rem;
            color: rgba(255, 215, 0, 0.2);
            font-weight: bold;
            animation: char-rise linear infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        @keyframes char-rise {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
        
        /* 横向飘动的书卷 */
        .scroll-horizontal {
            position: absolute;
            font-size: 3rem;
            animation: scroll-move linear infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        @keyframes scroll-move {
            0% { transform: translateX(-100px) translateY(0) scaleX(1); }
            48% { transform: translateX(calc(100vw + 100px)) translateY(-20px) scaleX(1); }
            50% { transform: translateX(calc(100vw + 100px)) translateY(-20px) scaleX(-1); }
            98% { transform: translateX(-100px) translateY(0) scaleX(-1); }
            100% { transform: translateX(-100px) translateY(0) scaleX(1); }
        }
        
        /* 垂直飘动 */
        .float-vertical {
            position: absolute;
            font-size: 2.5rem;
            animation: float-up-down ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        @keyframes float-up-down {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-50px) rotate(10deg); }
        }
        
        /* 文房四宝摇摆 */
        .study-tool {
            position: absolute;
            font-size: 4rem;
            animation: tool-sway ease-in-out infinite;
            transform-origin: bottom center;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        @keyframes tool-sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        
        /* 印章脉动 */
        .seal {
            position: absolute;
            font-size: 3rem;
            animation: seal-pulse ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        @keyframes seal-pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        
        /* 灯笼漂浮 */
        .lantern {
            position: absolute;
            font-size: 2.5rem;
            animation: lantern-float ease-in-out infinite;
            filter: drop-shadow(0 4px 12px rgba(255,0,0,0.3));
        }
        @keyframes lantern-float {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-30px) rotate(3deg); }
        }
        
        /* 金币旋转 */
        .coin {
            position: absolute;
            font-size: 2rem;
            animation: coin-spin linear infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        @keyframes coin-spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        
        /* 光线效果 */
        .light-ray {
            position: absolute;
            top: 0;
            width: 100px;
            height: 100%;
            background: linear-gradient(to bottom, 
                rgba(255, 215, 0, 0.1) 0%, 
                rgba(255, 215, 0, 0.05) 50%, 
                transparent 100%);
            animation: light-move linear infinite;
            opacity: 0.3;
        }
        @keyframes light-move {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(100vw); }
        }
        
        /* 内容层 */
        .content-layer {
            position: relative;
            z-index: 10;
        }
        
        .card {
            transition: all 0.3s;
            animation: card-float ease-in-out infinite;
            opacity: 0.85;
            backdrop-filter: blur(10px);
        }
        .card:hover {
            animation-play-state: paused;
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            opacity: 1;
        }
        
        @keyframes card-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .card:nth-child(1) {
            animation-duration: 3s;
            animation-delay: 0s;
        }
        .card:nth-child(2) {
            animation-duration: 3.5s;
            animation-delay: 0.5s;
        }
        .card:nth-child(3) {
            animation-duration: 3.2s;
            animation-delay: 1s;
        }
        .card:nth-child(4) {
            animation-duration: 3.8s;
            animation-delay: 1.5s;
        }
        
        .welcome-text {
            animation: fadeInScale 1s ease-out;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .profile-icon {
            animation: fadeInScale 1s ease-out 0.3s both, profile-bounce 2s ease-in-out 1.5s infinite;
            transition: all 0.3s;
        }
        .profile-icon:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.5);
        }
        @keyframes profile-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body class="w-full min-h-screen">
    <!-- 背景动画层 -->
    <div class="bg-layer">
        <!-- 光线效果 -->
        <div class="light-ray" style="left: 10%; animation-duration: 15s; animation-delay: 0s;"></div>
        <div class="light-ray" style="left: 40%; animation-duration: 20s; animation-delay: 3s;"></div>
        <div class="light-ray" style="left: 70%; animation-duration: 18s; animation-delay: 6s;"></div>
        
        <!-- 飘落的汉字 -->
        <div class="floating-char" style="left: 5%; bottom: 0; animation-duration: 12s; animation-delay: 0s;">文</div>
        <div class="floating-char" style="left: 15%; bottom: 0; animation-duration: 15s; animation-delay: 2s;">字</div>
        <div class="floating-char" style="left: 25%; bottom: 0; animation-duration: 13s; animation-delay: 4s;">学</div>
        <div class="floating-char" style="left: 35%; bottom: 0; animation-duration: 14s; animation-delay: 1s;">习</div>
        <div class="floating-char" style="left: 50%; bottom: 0; animation-duration: 16s; animation-delay: 3s;">书</div>
        <div class="floating-char" style="left: 65%; bottom: 0; animation-duration: 11s; animation-delay: 5s;">画</div>
        <div class="floating-char" style="left: 75%; bottom: 0; animation-duration: 14s; animation-delay: 2s;">墨</div>
        <div class="floating-char" style="left: 85%; bottom: 0; animation-duration: 13s; animation-delay: 4s;">香</div>
        <div class="floating-char" style="left: 95%; bottom: 0; animation-duration: 15s; animation-delay: 1s;">雅</div>
        
        <!-- 横向飘动的书卷 -->
        <div class="scroll-horizontal" style="top: 15%; animation-duration: 25s; animation-delay: 0s;">📜</div>
        <div class="scroll-horizontal" style="top: 35%; animation-duration: 30s; animation-delay: 5s;">📕</div>
        <div class="scroll-horizontal" style="top: 55%; animation-duration: 28s; animation-delay: 10s;">📗</div>
        <div class="scroll-horizontal" style="top: 25%; animation-duration: 32s; animation-delay: 8s;">📖</div>
        <div class="scroll-horizontal" style="top: 45%; animation-duration: 27s; animation-delay: 15s;">📘</div>
        
        <!-- 垂直飘动元素 -->
        <div class="float-vertical" style="left: 10%; top: 20%; animation-duration: 4s; animation-delay: 0s;">🖌️</div>
        <div class="float-vertical" style="left: 85%; top: 30%; animation-duration: 5s; animation-delay: 2s;">✒️</div>
        <div class="float-vertical" style="left: 70%; top: 50%; animation-duration: 4.5s; animation-delay: 1s;">🖊️</div>
        
        <!-- 灯笼 -->
        <div class="lantern" style="left: 20%; top: 10%; animation-duration: 6s; animation-delay: 0s;">🏮</div>
        <div class="lantern" style="left: 60%; top: 15%; animation-duration: 7s; animation-delay: 3s;">🏮</div>
        <div class="lantern" style="left: 40%; top: 25%; animation-duration: 6.5s; animation-delay: 5s;">🏮</div>
        
        <!-- 文房四宝 - 底部 -->
        <div class="study-tool" style="left: 5%; bottom: 0; animation-duration: 3s; animation-delay: 0s;">📚</div>
        <div class="study-tool" style="left: 18%; bottom: 0; animation-duration: 3.5s; animation-delay: 1s;">📙</div>
        <div class="study-tool" style="left: 32%; bottom: 0; animation-duration: 4s; animation-delay: 0.5s;">📓</div>
        <div class="study-tool" style="left: 48%; bottom: 0; animation-duration: 3.2s; animation-delay: 2s;">📔</div>
        <div class="study-tool" style="left: 65%; bottom: 0; animation-duration: 3.8s; animation-delay: 1.5s;">📒</div>
        <div class="study-tool" style="left: 78%; bottom: 0; animation-duration: 3.3s; animation-delay: 0.8s;">📕</div>
        <div class="study-tool" style="left: 92%; bottom: 0; animation-duration: 3.6s; animation-delay: 2.5s;">📗</div>
        
        <!-- 印章 -->
        <div class="seal" style="left: 8%; bottom: 5%; animation-duration: 4s; animation-delay: 0s;">🔴</div>
        <div class="seal" style="left: 25%; bottom: 3%; animation-duration: 5s; animation-delay: 1s;">🔴</div>
        <div class="seal" style="left: 55%; bottom: 4%; animation-duration: 4.5s; animation-delay: 2s;">🔴</div>
        <div class="seal" style="left: 82%; bottom: 6%; animation-duration: 4.8s; animation-delay: 1.5s;">🔴</div>
        
        <!-- 金币 -->
        <div class="coin" style="left: 12%; bottom: 8%; animation-duration: 20s; animation-delay: 0s;">🪙</div>
        <div class="coin" style="left: 42%; bottom: 10%; animation-duration: 25s; animation-delay: 5s;">🪙</div>
        <div class="coin" style="left: 72%; bottom: 7%; animation-duration: 22s; animation-delay: 10s;">🪙</div>
        
        <!-- 其他装饰 -->
        <div class="seal" style="left: 15%; bottom: 2%; animation-duration: 5s; animation-delay: 0s;">🎋</div>
        <div class="seal" style="left: 38%; bottom: 1%; animation-duration: 6s; animation-delay: 2s;">🎋</div>
        <div class="seal" style="left: 68%; bottom: 3%; animation-duration: 5.5s; animation-delay: 4s;">🎋</div>
        <div class="seal" style="left: 88%; bottom: 2%; animation-duration: 5.8s; animation-delay: 3s;">🎋</div>
    </div>
    
    <!-- 内容层 -->
    <div class="content-layer">
    <!-- 状态栏 -->
    <div class="bg-black/30 backdrop-blur-sm px-6 py-2 flex justify-between items-center text-white text-sm">
        <div class="flex items-center gap-2">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
        </div>
        <div class="font-medium">10:24</div>
        <div class="flex items-center gap-2">
            <span>85%</span>
            <i class="fas fa-battery-three-quarters"></i>
        </div>
    </div>

    <!-- 欢迎区域 - 左上角 -->
    <div class="absolute top-14 left-8 z-20">
        <div class="flex items-center gap-4 welcome-text">
            <span class="text-5xl">👋</span>
            <h2 class="text-white text-4xl font-bold" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">你好，小朋友！</h2>
        </div>
    </div>

    <!-- 个人中心图标 - 右上角 -->
    <div class="absolute top-14 right-8 z-20">
        <div class="profile-icon bg-gradient-to-br from-yellow-400 via-orange-500 to-red-600 w-24 h-24 rounded-full flex items-center justify-center cursor-pointer shadow-xl" onclick="navigateTo('profile.html')">
            <div class="relative">
                <span class="text-5xl">👨‍🎓</span>
                <span class="absolute -top-1 -right-1 text-2xl">⚙️</span>
            </div>
        </div>
    </div>

    <!-- 主要功能卡片 - 中心区域 -->
    <div class="flex items-center justify-center min-h-screen px-8" style="margin-top: -40px;">
        <div class="grid grid-cols-4 gap-6 max-w-4xl w-full">
            <!-- 课程探索 -->
            <div class="card bg-gradient-to-br from-blue-400/80 to-blue-600/80 rounded-3xl cursor-pointer shadow-2xl border border-white/20 flex flex-col items-center justify-center p-4" style="aspect-ratio: 1/1;" onclick="navigateTo('explore.html')">
                <div class="text-6xl mb-2">📚</div>
                <h3 class="text-white text-base font-bold mb-1.5 text-center">课程探索</h3>
                <p class="text-white/90 text-xs mb-2 text-center">发现汉字的奥秘</p>
                <span class="bg-white/30 text-white text-xs px-2.5 py-0.5 rounded-full">48个视频</span>
            </div>

            <!-- 视频学习 -->
            <div class="card bg-gradient-to-br from-emerald-400/80 to-teal-600/80 rounded-3xl cursor-pointer shadow-2xl border border-white/20 flex flex-col items-center justify-center p-4" style="aspect-ratio: 1/1;" onclick="navigateTo('watch.html')">
                <div class="text-6xl mb-2">🎬</div>
                <h3 class="text-white text-base font-bold mb-1.5 text-center">视频学习</h3>
                <p class="text-white/90 text-xs mb-2 text-center">观看精彩课程</p>
                <span class="bg-white/30 text-white text-xs px-2.5 py-0.5 rounded-full">随时观看</span>
            </div>

            <!-- 听一听 -->
            <div class="card bg-gradient-to-br from-purple-400/80 to-pink-600/80 rounded-3xl cursor-pointer shadow-2xl border border-white/20 flex flex-col items-center justify-center p-4" style="aspect-ratio: 1/1;" onclick="navigateTo('listen.html')">
                <div class="text-6xl mb-2">🎧</div>
                <h3 class="text-white text-base font-bold mb-1.5 text-center">听一听</h3>
                <p class="text-white/90 text-xs mb-2 text-center">听汉字故事</p>
                <span class="bg-white/30 text-white text-xs px-2.5 py-0.5 rounded-full">语音朗读</span>
            </div>

            <!-- 趣味问答 -->
            <div class="card bg-gradient-to-br from-yellow-400/80 to-orange-500/80 rounded-3xl cursor-pointer shadow-2xl border border-white/20 flex flex-col items-center justify-center p-4" style="aspect-ratio: 1/1;" onclick="navigateTo('quiz.html')">
                <div class="text-6xl mb-2">❓</div>
                <h3 class="text-white text-base font-bold mb-1.5 text-center">趣味问答</h3>
                <p class="text-white/90 text-xs mb-2 text-center">挑战汉字知识</p>
                <span class="bg-white/30 text-white text-xs px-2.5 py-0.5 rounded-full">50道题目</span>
            </div>
        </div>
    </div>
    </div>

    <script>
        function navigateTo(page) {
            window.parent.postMessage({
                action: 'navigate',
                page: page
            }, '*');
        }
    </script>
</body>
</html>
