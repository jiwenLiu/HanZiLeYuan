<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植物篇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #1a5c3a 0%, #2d7a4f 50%, #4a9e6f 100%);
        }
        
        /* 卡片漂浮动画 - 和首页一致 */
        @keyframes card-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .video-card {
            transition: all 0.3s;
            animation: card-float ease-in-out infinite;
            opacity: 0.85;
            backdrop-filter: blur(15px);
        }
        
        .video-card:hover {
            animation-play-state: paused;
            transform: translateY(-8px) scale(1.02);
            opacity: 1;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        
        /* 不同卡片的动画延迟 - 和首页一致 */
        .video-card:nth-child(1) {
            animation-duration: 3s;
            animation-delay: 0s;
        }
        .video-card:nth-child(2) {
            animation-duration: 3.5s;
            animation-delay: 0.2s;
        }
        .video-card:nth-child(3) {
            animation-duration: 3.2s;
            animation-delay: 0.4s;
        }
        
        @keyframes pulse-emoji {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .emoji-icon {
            animation: pulse-emoji 2s ease-in-out infinite;
        }
        .back-button {
            animation: fadeInScale 1s ease-out;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="w-full min-h-screen overflow-auto pb-8">
    <!-- 状态栏 -->
    <div class="bg-black/30 backdrop-blur-sm px-6 py-2 flex justify-between items-center text-white text-sm sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
        </div>
        <div class="font-medium">10:24</div>
        <div class="flex items-center gap-2">
            <span>85%</span>
            <i class="fas fa-battery-three-quarters"></i>
        </div>
    </div>

    <!-- 返回按钮 -->
    <div class="absolute top-14 left-8 z-20">
        <button class="back-button bg-gradient-to-br from-yellow-400 to-orange-500 w-16 h-16 rounded-full flex items-center justify-center cursor-pointer shadow-xl hover:scale-110 transition-all" onclick="navigateTo('watch.html')">
            <i class="fas fa-arrow-left text-white text-3xl"></i>
        </button>
    </div>

    <!-- 主内容区域 - 居中布局 -->
    <div class="flex items-center justify-center min-h-screen" style="margin-top: -60px; padding-left: 5%; padding-right: 3%;">
        <div class="w-full max-w-5xl mx-auto">
            <!-- 标题区域 -->
            <div class="text-center mb-6">
                <h1 class="text-4xl font-bold text-white mb-2 drop-shadow-lg">植物篇 🌱</h1>
                <p class="text-white/90 text-base">认识植物相关的汉字（第5-7课）</p>
            </div>

            <!-- 视频卡片容器 - 带左右箭头 -->
            <div class="flex items-center gap-8">
                <!-- 左箭头 -->
                <button id="prevBtn" class="arrow-button bg-gradient-to-br from-yellow-400 to-orange-500 w-14 h-14 rounded-full flex items-center justify-center cursor-pointer shadow-xl hover:scale-110 transition-all opacity-50 cursor-not-allowed" onclick="previousPage()">
                    <i class="fas fa-chevron-left text-white text-2xl"></i>
                </button>

                <!-- 卡片区域 -->
                <div class="flex-1 relative overflow-hidden">
                    <!-- 第一页 - 全部3个课程 -->
                    <div id="page1" class="grid grid-cols-3 gap-6 transition-all duration-500">
            <!-- 第5课《木林森本末片》 -->
            <div class="video-card bg-white/20 border border-white/30 rounded-3xl p-4 cursor-pointer shadow-xl" onclick="navigateTo('video-player.html?video=木林森本末片')">
                <div class="emoji-icon text-5xl text-center mb-2">🌳</div>
                <h3 class="text-white text-lg font-bold text-center mb-1">第5课《木林森本末片》</h3>
                <p class="text-white/90 text-center text-xs mb-1.5">从一棵树到森林</p>
                <div class="text-center mb-2">
                    <span class="text-white/70 text-xs">⏱️ 15:20</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="bg-green-500/50 text-white text-xs px-2 py-1 rounded">已完成</span>
                    <div class="text-yellow-400">
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                    </div>
                </div>
            </div>

            <!-- 第6课《树桑桃松柳》 -->
            <div class="video-card bg-white/20 border border-white/30 rounded-3xl p-4 cursor-pointer shadow-xl" onclick="navigateTo('video-player.html?video=树桑桃松柳')">
                <div class="emoji-icon text-5xl text-center mb-2">🌲</div>
                <h3 class="text-white text-lg font-bold text-center mb-1">第6课《树桑桃松柳》</h3>
                <p class="text-white/90 text-center text-xs mb-1.5">各种各样的树</p>
                <div class="text-center mb-2">
                    <span class="text-white/70 text-xs">⏱️ 14:35</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="bg-blue-500/50 text-white text-xs px-2 py-1 rounded">学习中</span>
                    <div class="text-yellow-400">
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="far fa-star"></i>
                    </div>
                </div>
            </div>

            <!-- 第7课《米麦菜果瓜》 -->
            <div class="video-card bg-white/20 border border-white/30 rounded-3xl p-4 cursor-pointer shadow-xl" onclick="navigateTo('video-player.html?video=米麦菜果瓜')">
                <div class="emoji-icon text-5xl text-center mb-2">🌾</div>
                <h3 class="text-white text-lg font-bold text-center mb-1">第7课《米麦菜果瓜》</h3>
                <p class="text-white/90 text-center text-xs mb-1.5">农作物和果实</p>
                <div class="text-center mb-2">
                    <span class="text-white/70 text-xs">⏱️ 13:50</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="bg-gray-500/50 text-white text-xs px-2 py-1 rounded">
                        <i class="fas fa-lock mr-1"></i>未开始
                    </span>
                    <div class="text-gray-400">
                        <i class="far fa-star"></i>
                        <i class="far fa-star"></i>
                        <i class="far fa-star"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 右箭头 -->
    <button id="nextBtn" class="arrow-button bg-gradient-to-br from-yellow-400 to-orange-500 w-14 h-14 rounded-full flex items-center justify-center cursor-pointer shadow-xl hover:scale-110 transition-all opacity-50 cursor-not-allowed" onclick="nextPage()">
        <i class="fas fa-chevron-right text-white text-2xl"></i>
    </button>
</div>

<!-- 页码指示器 -->
<div class="flex justify-center gap-2 mt-6">
    <div id="dot1" class="w-3 h-3 rounded-full bg-white shadow-lg transition-all"></div>
</div>
</div>
</div>
    
    <script>
        function navigateTo(page) {
            window.parent.postMessage({
                action: 'navigate',
                page: page
            }, '*');
        }

        // 翻页功能（植物篇只有1页，禁用翻页按钮）
        let currentPage = 1;
        const totalPages = 1;

        function updatePageDisplay() {
            // 植物篇只有1页，箭头始终禁用
            document.getElementById('prevBtn').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('nextBtn').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('dot1').classList.add('bg-white');
        }

        function previousPage() {
            // 只有1页，不执行翻页
        }

        function nextPage() {
            // 只有1页，不执行翻页
        }

        // 页面加载时初始化
        updatePageDisplay();
    </script>
</body>
</html>
