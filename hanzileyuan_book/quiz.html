<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味问答</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #d84315 0%, #f4511e 50%, #ff7043 100%);
            min-height: 100vh;
        }
        .quiz-card {
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .answer-option {
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }
        .answer-option:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.02);
        }
        .answer-option.selected {
            background: rgba(255,215,0,0.3);
            border-color: #fbbf24;
        }
        .answer-option.correct {
            background: rgba(82,196,26,0.3);
            border-color: #52c41a;
        }
        .answer-option.wrong {
            background: rgba(245,34,45,0.3);
            border-color: #f5222d;
        }
        .back-button {
            animation: fadeInScale 1s ease-out;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .emoji-bounce {
            animation: bounce 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="w-full min-h-screen pb-8">
    <!-- 状态栏 -->
    <div class="bg-black/30 backdrop-blur-sm px-6 py-2 flex justify-between items-center text-white text-sm sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
        </div>
        <div class="font-medium">10:24</div>
        <div class="flex items-center gap-2">
            <span>85%</span>
            <i class="fas fa-battery-three-quarters"></i>
        </div>
    </div>

    <!-- 返回按钮 -->
    <div class="absolute top-14 left-8 z-20">
        <button class="back-button bg-gradient-to-br from-yellow-400 to-orange-500 w-16 h-16 rounded-full flex items-center justify-center cursor-pointer shadow-xl hover:scale-110 transition-all" onclick="navigateTo('practice.html')">
            <i class="fas fa-arrow-left text-white text-3xl"></i>
        </button>
    </div>

    <!-- 标题 -->
    <div class="px-6 pt-24 pb-6 text-center">
        <h1 class="text-4xl font-bold text-white mb-2">❓ 趣味问答</h1>
        <p class="text-white/80 text-lg">挑战汉字知识，加油！</p>
    </div>

    <!-- 进度条 -->
    <div class="px-6 mb-6">
        <div class="bg-white/20 backdrop-blur-md rounded-2xl p-4 border border-white/20">
            <div class="flex justify-between text-white text-sm mb-2">
                <span>第 1 题 / 共 10 题</span>
                <span>得分: 0</span>
            </div>
            <div class="w-full bg-white/20 rounded-full h-3">
                <div class="bg-gradient-to-r from-yellow-400 to-orange-500 h-3 rounded-full" style="width: 10%"></div>
            </div>
        </div>
    </div>

    <!-- 问题卡片 -->
    <div class="px-6 mb-6">
        <div class="quiz-card bg-gradient-to-br from-white/20 to-white/10 backdrop-blur-md rounded-3xl p-8 border border-white/20">
            <!-- 问题 -->
            <div class="text-center mb-8">
                <div class="emoji-bounce text-8xl mb-4">🐴</div>
                <h2 class="text-white text-2xl font-bold mb-4">这个emoji代表哪个汉字？</h2>
            </div>

            <!-- 选项 -->
            <div class="space-y-4">
                <div class="answer-option bg-white/10 border-2 border-white/30 rounded-2xl p-4 flex items-center gap-4" onclick="selectAnswer(this, true)">
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center flex-shrink-0">
                        <span class="text-white text-xl font-bold">A</span>
                    </div>
                    <div class="text-white text-xl font-bold flex-1">马</div>
                    <i class="fas fa-check-circle text-white text-2xl hidden"></i>
                </div>

                <div class="answer-option bg-white/10 border-2 border-white/30 rounded-2xl p-4 flex items-center gap-4" onclick="selectAnswer(this, false)">
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center flex-shrink-0">
                        <span class="text-white text-xl font-bold">B</span>
                    </div>
                    <div class="text-white text-xl font-bold flex-1">牛</div>
                    <i class="fas fa-times-circle text-white text-2xl hidden"></i>
                </div>

                <div class="answer-option bg-white/10 border-2 border-white/30 rounded-2xl p-4 flex items-center gap-4" onclick="selectAnswer(this, false)">
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center flex-shrink-0">
                        <span class="text-white text-xl font-bold">C</span>
                    </div>
                    <div class="text-white text-xl font-bold flex-1">羊</div>
                    <i class="fas fa-times-circle text-white text-2xl hidden"></i>
                </div>

                <div class="answer-option bg-white/10 border-2 border-white/30 rounded-2xl p-4 flex items-center gap-4" onclick="selectAnswer(this, false)">
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center flex-shrink-0">
                        <span class="text-white text-xl font-bold">D</span>
                    </div>
                    <div class="text-white text-xl font-bold flex-1">鸟</div>
                    <i class="fas fa-times-circle text-white text-2xl hidden"></i>
                </div>
            </div>

            <!-- 提交按钮 -->
            <div class="mt-8 text-center">
                <button class="bg-gradient-to-r from-yellow-400 to-orange-500 text-white px-12 py-4 rounded-full text-xl font-bold shadow-xl hover:scale-105 transition-all" onclick="submitAnswer()">
                    提交答案
                </button>
            </div>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="px-6 mb-6">
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-4 text-center border border-white/20">
                <div class="text-3xl font-bold text-white">156</div>
                <div class="text-white/70 text-xs mt-1">已答题目</div>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-4 text-center border border-white/20">
                <div class="text-3xl font-bold text-white">89%</div>
                <div class="text-white/70 text-xs mt-1">正确率</div>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-xl p-4 text-center border border-white/20">
                <div class="text-3xl font-bold text-white">1250</div>
                <div class="text-white/70 text-xs mt-1">总得分</div>
            </div>
        </div>
    </div>

    <!-- 题型选择 -->
    <div class="px-6">
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
            <div class="px-4 py-3 bg-white/5">
                <h3 class="text-white font-bold">更多题型</h3>
            </div>
            <div>
                <div class="px-4 py-4 flex items-center justify-between cursor-pointer border-b border-white/10 hover:bg-white/5 transition-all" onclick="navigateTo('quiz-picture.html')">
                    <div class="flex items-center gap-3">
                        <span class="text-3xl">🖼️</span>
                        <div>
                            <div class="text-white font-bold">看图识字</div>
                            <div class="text-white/60 text-sm">根据图片选择汉字</div>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-white/50"></i>
                </div>
                <div class="px-4 py-4 flex items-center justify-between cursor-pointer border-b border-white/10 hover:bg-white/5 transition-all" onclick="navigateTo('quiz-audio.html')">
                    <div class="flex items-center gap-3">
                        <span class="text-3xl">🎧</span>
                        <div>
                            <div class="text-white font-bold">听音识字</div>
                            <div class="text-white/60 text-sm">听发音选择汉字</div>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-white/50"></i>
                </div>
                <div class="px-4 py-4 flex items-center justify-between cursor-pointer border-b border-white/10 hover:bg-white/5 transition-all" onclick="navigateTo('quiz-stroke.html')">
                    <div class="flex items-center gap-3">
                        <span class="text-3xl">✏️</span>
                        <div>
                            <div class="text-white font-bold">笔画顺序</div>
                            <div class="text-white/60 text-sm">选择正确的笔画顺序</div>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-white/50"></i>
                </div>
                <div class="px-4 py-4 flex items-center justify-between cursor-pointer hover:bg-white/5 transition-all" onclick="navigateTo('quiz-words.html')">
                    <div class="flex items-center gap-3">
                        <span class="text-3xl">🧩</span>
                        <div>
                            <div class="text-white font-bold">组词游戏</div>
                            <div class="text-white/60 text-sm">用汉字组成词语</div>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-white/50"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedOption = null;

        function navigateTo(page) {
            window.parent.postMessage({
                action: 'navigate',
                page: page
            }, '*');
        }

        function selectAnswer(element, isCorrect) {
            // 移除之前的选择
            document.querySelectorAll('.answer-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // 标记当前选择
            element.classList.add('selected');
            selectedOption = { element, isCorrect };
        }

        function submitAnswer() {
            if (!selectedOption) {
                alert('请先选择一个答案！');
                return;
            }

            // 显示结果
            const { element, isCorrect } = selectedOption;
            
            // 移除所有选中状态
            document.querySelectorAll('.answer-option').forEach(opt => {
                opt.classList.remove('selected');
                opt.style.pointerEvents = 'none';
            });

            if (isCorrect) {
                element.classList.add('correct');
                element.querySelector('.fa-check-circle').classList.remove('hidden');
                alert('🎉 恭喜你答对了！\n\n这个🐴emoji代表"马"字。\n\n获得积分：+10分');
            } else {
                element.classList.add('wrong');
                element.querySelector('.fa-times-circle').classList.remove('hidden');
                
                // 显示正确答案
                document.querySelectorAll('.answer-option').forEach(opt => {
                    if (opt !== element && opt.querySelector('.text-xl').textContent === '马') {
                        opt.classList.add('correct');
                        opt.querySelector('.fa-check-circle').classList.remove('hidden');
                    }
                });
                
                alert('😢 很遗憾答错了！\n\n正确答案是：马\n\n继续加油哦！');
            }

            // 3秒后跳转下一题
            setTimeout(() => {
                alert('准备下一题...');
            }, 2000);
        }
    </script>
</body>
</html>
