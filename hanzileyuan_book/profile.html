<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #1565c0 0%, #1976d2 50%, #42a5f5 100%);
            min-height: 100vh;
        }
        .profile-section {
            transition: all 0.3s;
        }
        .profile-section:hover {
            transform: translateX(4px);
        }
        .menu-item {
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.15);
        }
        .tab-item {
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s;
        }
        .tab-item.active {
            color: #d4af37;
        }
        .tab-item:hover {
            color: #daa520;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="w-full min-h-screen pb-8">
    <!-- 状态栏 -->
    <div class="bg-black/30 backdrop-blur-sm px-6 py-2 flex justify-between items-center text-white text-sm sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
        </div>
        <div class="font-medium">10:24</div>
        <div class="flex items-center gap-2">
            <span>85%</span>
            <i class="fas fa-battery-three-quarters"></i>
        </div>
    </div>

    <!-- 个人信息卡片 -->
    <div class="px-6 py-8">
        <div class="bg-gradient-to-br from-white/20 to-white/10 backdrop-blur-md rounded-2xl p-6 border border-white/20">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-20 h-20 rounded-full bg-gradient-to-br from-yellow-400 to-orange-500 flex items-center justify-center text-4xl">
                    👧
                </div>
                <div class="flex-1">
                    <h2 class="text-white text-2xl font-bold mb-1">小明同学</h2>
                    <p class="text-white/70 text-sm">Lv.8 · 汉字小达人</p>
                </div>
                <button class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-full text-sm">
                    编辑
                </button>
            </div>
            
            <!-- 学习数据 -->
            <div class="grid grid-cols-3 gap-4 text-center">
                <div>
                    <div class="text-2xl font-bold text-white">25</div>
                    <div class="text-white/70 text-xs mt-1">连续天数</div>
                </div>
                <div>
                    <div class="text-2xl font-bold text-white">156</div>
                    <div class="text-white/70 text-xs mt-1">已学汉字</div>
                </div>
                <div>
                    <div class="text-2xl font-bold text-white">1250</div>
                    <div class="text-white/70 text-xs mt-1">总积分</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 菜单列表 -->
    <div class="px-6 space-y-4">
        <!-- 学习工具 -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
            <div class="px-4 py-3 bg-white/5">
                <h3 class="text-white font-bold">📖 学习工具</h3>
            </div>
            <div class="menu-item px-4 py-4 flex items-center justify-between cursor-pointer border-b border-white/10" onclick="navigateTo('learning-history.html')">
                <div class="flex items-center gap-3">
                    <i class="fas fa-history text-white text-xl"></i>
                    <span class="text-white">学习记录</span>
                </div>
                <i class="fas fa-chevron-right text-white/50"></i>
            </div>
            <div class="menu-item px-4 py-4 flex items-center justify-between cursor-pointer border-b border-white/10" onclick="navigateTo('my-favorites.html')">
                <div class="flex items-center gap-3">
                    <i class="fas fa-star text-white text-xl"></i>
                    <span class="text-white">我的收藏</span>
                </div>
                <i class="fas fa-chevron-right text-white/50"></i>
            </div>
            <div class="menu-item px-4 py-4 flex items-center justify-between cursor-pointer" onclick="navigateTo('achievements.html')">
                <div class="flex items-center gap-3">
                    <i class="fas fa-trophy text-white text-xl"></i>
                    <span class="text-white">成就勋章</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-white/70 text-sm">12/20</span>
                    <i class="fas fa-chevron-right text-white/50"></i>
                </div>
            </div>
        </div>

        <!-- 设置选项 -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
            <div class="px-4 py-3 bg-white/5">
                <h3 class="text-white font-bold">⚙️ 设置选项</h3>
            </div>
            <div class="menu-item px-4 py-4 flex items-center justify-between cursor-pointer border-b border-white/10" onclick="navigateTo('notification-settings.html')">
                <div class="flex items-center gap-3">
                    <i class="fas fa-bell text-white text-xl"></i>
                    <span class="text-white">通知设置</span>
                </div>
                <i class="fas fa-chevron-right text-white/50"></i>
            </div>
            <div class="menu-item px-4 py-4 flex items-center justify-between cursor-pointer border-b border-white/10" onclick="navigateTo('parent-control.html')">
                <div class="flex items-center gap-3">
                    <i class="fas fa-user-shield text-white text-xl"></i>
                    <span class="text-white">家长控制</span>
                </div>
                <i class="fas fa-chevron-right text-white/50"></i>
            </div>
            <div class="menu-item px-4 py-4 flex items-center justify-between cursor-pointer" onclick="navigateTo('help-feedback.html')">
                <div class="flex items-center gap-3">
                    <i class="fas fa-question-circle text-white text-xl"></i>
                    <span class="text-white">帮助与反馈</span>
                </div>
                <i class="fas fa-chevron-right text-white/50"></i>
            </div>
        </div>

        <!-- 关于 -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
            <div class="menu-item px-4 py-4 flex items-center justify-between cursor-pointer" onclick="navigateTo('about.html')">
                <div class="flex items-center gap-3">
                    <i class="fas fa-info-circle text-white text-xl"></i>
                    <span class="text-white">关于汉字乐园</span>
                </div>
                <span class="text-white/50 text-sm">v1.0</span>
            </div>
        </div>
    </div>

    <script>
        function navigateTo(page) {
            window.parent.postMessage({
                action: 'navigate',
                page: page
            }, '*');
        }
    </script>
</body>
</html>
