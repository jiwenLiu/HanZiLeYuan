<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>看图识字</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #0891b2 0%, #06b6d4 50%, #22d3ee 100%);
        }
        .answer-option {
            transition: all 0.3s;
            cursor: pointer;
        }
        .answer-option:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }
        .answer-option.selected {
            background: rgba(255,215,0,0.3);
            border-color: #fbbf24;
        }
        .answer-option.correct {
            background: rgba(82,196,26,0.3);
            border-color: #52c41a;
        }
        .answer-option.wrong {
            background: rgba(245,34,45,0.3);
            border-color: #f5222d;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .image-pulse {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="w-full min-h-screen pb-8">
    <!-- 状态栏 -->
    <div class="bg-black/30 backdrop-blur-sm px-6 py-2 flex justify-between items-center text-white text-sm sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
        </div>
        <div class="font-medium">10:24</div>
        <div class="flex items-center gap-2">
            <span>85%</span>
            <i class="fas fa-battery-three-quarters"></i>
        </div>
    </div>

    <!-- 返回按钮 -->
    <div class="absolute top-14 left-8 z-20">
        <button class="bg-gradient-to-br from-yellow-400 to-orange-500 w-16 h-16 rounded-full flex items-center justify-center cursor-pointer shadow-xl hover:scale-110 transition-all" onclick="navigateTo('quiz.html')">
            <i class="fas fa-arrow-left text-white text-3xl"></i>
        </button>
    </div>

    <!-- 标题 -->
    <div class="px-6 pt-24 pb-6 text-center">
        <h1 class="text-4xl font-bold text-white mb-2">🖼️ 看图识字</h1>
        <p class="text-white/80">看图片选择正确的汉字</p>
    </div>

    <!-- 进度 -->
    <div class="px-6 mb-6">
        <div class="bg-white/20 backdrop-blur-md rounded-2xl p-4 border border-white/30">
            <div class="flex justify-between text-white text-sm mb-2">
                <span>第 1 题 / 共 10 题</span>
                <span>得分: <span id="score">0</span> / 100</span>
            </div>
            <div class="w-full bg-white/20 rounded-full h-3">
                <div id="progress" class="bg-gradient-to-r from-cyan-400 to-blue-500 h-3 rounded-full transition-all" style="width: 10%"></div>
            </div>
        </div>
    </div>

    <!-- 题目卡片 -->
    <div class="px-6 mb-6">
        <div class="bg-gradient-to-br from-white/20 to-white/10 backdrop-blur-md rounded-3xl p-8 border border-white/30">
            <!-- 图片展示 -->
            <div class="text-center mb-8">
                <div class="inline-block bg-white/20 backdrop-blur-md rounded-3xl p-8 border border-white/30 mb-4">
                    <div class="image-pulse text-9xl">🐴</div>
                </div>
                <h2 class="text-white text-2xl font-bold">这幅图代表哪个汉字？</h2>
            </div>

            <!-- 选项（网格布局）-->
            <div class="grid grid-cols-2 gap-4 max-w-md mx-auto">
                <div class="answer-option bg-white/10 border-2 border-white/30 rounded-2xl p-6 text-center" onclick="selectAnswer(this, true)">
                    <div class="text-white text-5xl font-bold mb-2">马</div>
                    <div class="text-white/70 text-sm">mǎ</div>
                </div>
                <div class="answer-option bg-white/10 border-2 border-white/30 rounded-2xl p-6 text-center" onclick="selectAnswer(this, false)">
                    <div class="text-white text-5xl font-bold mb-2">牛</div>
                    <div class="text-white/70 text-sm">niú</div>
                </div>
                <div class="answer-option bg-white/10 border-2 border-white/30 rounded-2xl p-6 text-center" onclick="selectAnswer(this, false)">
                    <div class="text-white text-5xl font-bold mb-2">羊</div>
                    <div class="text-white/70 text-sm">yáng</div>
                </div>
                <div class="answer-option bg-white/10 border-2 border-white/30 rounded-2xl p-6 text-center" onclick="selectAnswer(this, false)">
                    <div class="text-white text-5xl font-bold mb-2">鸟</div>
                    <div class="text-white/70 text-sm">niǎo</div>
                </div>
            </div>

            <!-- 提交按钮 -->
            <div class="mt-8 text-center">
                <button id="submitBtn" class="bg-gradient-to-r from-cyan-400 to-blue-500 text-white px-12 py-4 rounded-full text-xl font-bold shadow-xl hover:scale-105 transition-all" onclick="submitAnswer()">
                    提交答案
                </button>
            </div>

            <!-- 结果提示 -->
            <div id="result" class="mt-6 text-center hidden">
                <div class="bg-white/20 backdrop-blur-md rounded-2xl p-4 inline-block">
                    <span class="text-white text-lg font-bold"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="px-6 mb-6">
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-white/20 backdrop-blur-md rounded-xl p-4 text-center border border-white/30">
                <div class="text-white text-2xl font-bold" id="correct">0</div>
                <div class="text-white/70 text-xs mt-1">答对</div>
            </div>
            <div class="bg-white/20 backdrop-blur-md rounded-xl p-4 text-center border border-white/30">
                <div class="text-white text-2xl font-bold" id="wrong">0</div>
                <div class="text-white/70 text-xs mt-1">答错</div>
            </div>
            <div class="bg-white/20 backdrop-blur-md rounded-xl p-4 text-center border border-white/30">
                <div class="text-white text-2xl font-bold" id="accuracy">0%</div>
                <div class="text-white/70 text-xs mt-1">正确率</div>
            </div>
        </div>
    </div>

    <script>
        function navigateTo(page) {
            window.parent.postMessage({
                action: 'navigate',
                page: page
            }, '*');
        }

        let selectedOption = null;
        let correctCount = 0;
        let wrongCount = 0;

        function selectAnswer(element, isCorrect) {
            // 清除之前的选择
            document.querySelectorAll('.answer-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            // 标记当前选择
            element.classList.add('selected');
            selectedOption = { element, isCorrect };
        }

        function submitAnswer() {
            if (!selectedOption) {
                alert('请先选择一个答案！');
                return;
            }

            // 显示结果
            const resultDiv = document.getElementById('result');
            const resultText = resultDiv.querySelector('span');
            
            if (selectedOption.isCorrect) {
                selectedOption.element.classList.add('correct');
                selectedOption.element.classList.remove('selected');
                resultText.textContent = '✅ 回答正确！太棒了！';
                resultDiv.classList.remove('hidden');
                correctCount++;
                document.getElementById('correct').textContent = correctCount;
                
                // 更新得分
                const score = correctCount * 10;
                document.getElementById('score').textContent = score;
            } else {
                selectedOption.element.classList.add('wrong');
                selectedOption.element.classList.remove('selected');
                resultText.textContent = '❌ 回答错误，再想想吧！';
                resultDiv.classList.remove('hidden');
                wrongCount++;
                document.getElementById('wrong').textContent = wrongCount;
                
                // 显示正确答案
                document.querySelectorAll('.answer-option').forEach(opt => {
                    if (opt.querySelector('.text-5xl')?.textContent === '马') {
                        opt.classList.add('correct');
                    }
                });
            }

            // 更新正确率
            const total = correctCount + wrongCount;
            const accuracy = total > 0 ? Math.round((correctCount / total) * 100) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';

            // 禁用提交按钮
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').classList.add('opacity-50');
            
            // 2秒后进入下一题
            setTimeout(() => {
                alert('练习模式：点击返回按钮查看更多题目');
            }, 2000);
        }
    </script>
</body>
</html>
