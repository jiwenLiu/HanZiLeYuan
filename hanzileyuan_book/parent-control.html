<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家长控制</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #059669 0%, #10b981 50%, #34d399 100%);
        }
        .toggle-switch {
            width: 48px;
            height: 28px;
            background: rgba(255,255,255,0.3);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        .toggle-switch.active {
            background: #4ade80;
        }
        .toggle-switch::after {
            content: '';
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 12px;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }
        .toggle-switch.active::after {
            left: 22px;
        }
    </style>
</head>
<body class="w-full min-h-screen pb-8">
    <!-- 状态栏 -->
    <div class="bg-black/30 backdrop-blur-sm px-6 py-2 flex justify-between items-center text-white text-sm sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
        </div>
        <div class="font-medium">10:24</div>
        <div class="flex items-center gap-2">
            <span>85%</span>
            <i class="fas fa-battery-three-quarters"></i>
        </div>
    </div>

    <!-- 返回按钮 -->
    <div class="absolute top-14 left-8 z-20">
        <button class="bg-gradient-to-br from-yellow-400 to-orange-500 w-16 h-16 rounded-full flex items-center justify-center cursor-pointer shadow-xl hover:scale-110 transition-all" onclick="navigateTo('profile.html')">
            <i class="fas fa-arrow-left text-white text-3xl"></i>
        </button>
    </div>

    <!-- 标题 -->
    <div class="px-6 pt-24 pb-6 text-center">
        <h1 class="text-4xl font-bold text-white mb-2">🛡️ 家长控制</h1>
        <p class="text-white/80">管理孩子的学习时间和内容</p>
    </div>

    <!-- 设置项 -->
    <div class="px-6 space-y-4">
        <!-- 使用时间 -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
            <div class="px-4 py-3 bg-white/5">
                <h3 class="text-white font-bold">⏰ 使用时间</h3>
            </div>
            <div class="px-4 py-4 border-b border-white/10">
                <div class="flex items-center justify-between mb-3">
                    <h4 class="text-white font-medium">每日使用时长限制</h4>
                    <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
                </div>
                <div class="flex items-center gap-4">
                    <input type="range" min="30" max="180" value="60" class="flex-1" />
                    <span class="text-white font-bold">60分钟</span>
                </div>
            </div>
            <div class="px-4 py-4">
                <div class="flex items-center justify-between mb-3">
                    <div>
                        <h4 class="text-white font-medium">可用时间段</h4>
                        <p class="text-white/60 text-sm">设置允许使用的时间段</p>
                    </div>
                </div>
                <div class="bg-white/10 rounded-xl p-3 mt-2">
                    <div class="text-white text-sm">08:00 - 20:00</div>
                </div>
            </div>
        </div>

        <!-- 内容限制 -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
            <div class="px-4 py-3 bg-white/5">
                <h3 class="text-white font-bold">🔒 内容限制</h3>
            </div>
            <div class="px-4 py-4 flex items-center justify-between border-b border-white/10">
                <div>
                    <h4 class="text-white font-medium">课程难度限制</h4>
                    <p class="text-white/60 text-sm">仅显示适龄课程</p>
                </div>
                <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
            </div>
            <div class="px-4 py-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h4 class="text-white font-medium">跳过测验</h4>
                        <p class="text-white/60 text-sm">允许跳过挑战和测验</p>
                    </div>
                    <div class="toggle-switch" onclick="toggleSwitch(this)"></div>
                </div>
            </div>
        </div>

        <!-- 学习报告 -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
            <div class="px-4 py-3 bg-white/5">
                <h3 class="text-white font-bold">📊 学习报告</h3>
            </div>
            <div class="px-4 py-4 border-b border-white/10">
                <div class="flex items-center justify-between">
                    <div>
                        <h4 class="text-white font-medium">每日学习报告</h4>
                        <p class="text-white/60 text-sm">每天发送学习进度报告</p>
                    </div>
                    <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
                </div>
            </div>
            <div class="px-4 py-4 border-b border-white/10">
                <div class="flex items-center justify-between">
                    <div>
                        <h4 class="text-white font-medium">每周总结</h4>
                        <p class="text-white/60 text-sm">每周发送学习总结</p>
                    </div>
                    <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
                </div>
            </div>
            <div class="px-4 py-4">
                <button class="w-full bg-white/20 hover:bg-white/30 text-white py-3 rounded-xl font-medium">
                    查看本周报告
                </button>
            </div>
        </div>

        <!-- 家长密码 -->
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4 border border-white/20">
            <div class="flex items-center justify-between">
                <div>
                    <h4 class="text-white font-medium mb-1">🔐 家长密码保护</h4>
                    <p class="text-white/60 text-sm">修改设置需要密码验证</p>
                </div>
                <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
            </div>
            <button class="w-full bg-white/20 hover:bg-white/30 text-white py-2 rounded-xl font-medium mt-3">
                修改密码
            </button>
        </div>
    </div>

    <script>
        function navigateTo(page) {
            window.parent.postMessage({
                action: 'navigate',
                page: page
            }, '*');
        }

        function toggleSwitch(element) {
            element.classList.toggle('active');
        }
    </script>
</body>
</html>
