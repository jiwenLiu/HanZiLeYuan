<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>听一听</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #6a1b9a 0%, #8e24aa 50%, #ab47bc 100%);
            min-height: 100vh;
        }
        .char-display {
            animation: char-pulse 2s ease-in-out infinite;
        }
        @keyframes char-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .audio-wave {
            animation: wave 1s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }
        .char-list-item {
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .char-list-item:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(4px);
        }
        .back-button {
            animation: fadeInScale 1s ease-out;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="w-full min-h-screen pb-8">
    <!-- 状态栏 -->
    <div class="bg-black/30 backdrop-blur-sm px-6 py-2 flex justify-between items-center text-white text-sm sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
        </div>
        <div class="font-medium">10:24</div>
        <div class="flex items-center gap-2">
            <span>85%</span>
            <i class="fas fa-battery-three-quarters"></i>
        </div>
    </div>

    <!-- 返回按钮 -->
    <div class="absolute top-14 left-8 z-20">
        <button class="back-button bg-gradient-to-br from-yellow-400 to-orange-500 w-16 h-16 rounded-full flex items-center justify-center cursor-pointer shadow-xl hover:scale-110 transition-all" onclick="navigateTo('practice.html')">
            <i class="fas fa-arrow-left text-white text-3xl"></i>
        </button>
    </div>

    <!-- 标题 -->
    <div class="px-6 pt-24 pb-6 text-center">
        <h1 class="text-4xl font-bold text-white mb-2">🎧 听一听</h1>
        <p class="text-white/80 text-lg">标准发音，跟读练习</p>
    </div>

    <!-- 主显示区 -->
    <div class="px-6 mb-8">
        <div class="bg-gradient-to-br from-white/20 to-white/10 backdrop-blur-md rounded-3xl p-8 border border-white/20">
            <!-- 大字显示 -->
            <div class="char-display text-center mb-8">
                <div class="text-[180px] text-white font-bold leading-none mb-4">马</div>
                <div class="text-4xl text-white/80 mb-2">mǎ</div>
                <p class="text-white/60 text-lg">善于奔跑的动物</p>
            </div>

            <!-- 音频波形（模拟） -->
            <div class="flex justify-center items-end gap-1 h-20 mb-6">
                <div class="audio-wave w-2 bg-white/40 rounded-full" style="height: 30%; animation-delay: 0s;"></div>
                <div class="audio-wave w-2 bg-white/50 rounded-full" style="height: 50%; animation-delay: 0.1s;"></div>
                <div class="audio-wave w-2 bg-white/60 rounded-full" style="height: 70%; animation-delay: 0.2s;"></div>
                <div class="audio-wave w-2 bg-white/70 rounded-full" style="height: 90%; animation-delay: 0.3s;"></div>
                <div class="audio-wave w-2 bg-white/80 rounded-full" style="height: 100%; animation-delay: 0.4s;"></div>
                <div class="audio-wave w-2 bg-white/70 rounded-full" style="height: 90%; animation-delay: 0.5s;"></div>
                <div class="audio-wave w-2 bg-white/60 rounded-full" style="height: 70%; animation-delay: 0.6s;"></div>
                <div class="audio-wave w-2 bg-white/50 rounded-full" style="height: 50%; animation-delay: 0.7s;"></div>
                <div class="audio-wave w-2 bg-white/40 rounded-full" style="height: 30%; animation-delay: 0.8s;"></div>
            </div>

            <!-- 控制按钮 -->
            <div class="flex justify-center gap-4">
                <button class="bg-white/20 hover:bg-white/30 w-16 h-16 rounded-full flex items-center justify-center cursor-pointer transition-all" onclick="alert('播放标准发音：马（mǎ）')">
                    <i class="fas fa-volume-up text-white text-2xl"></i>
                </button>
                <button class="bg-gradient-to-br from-pink-500 to-rose-600 w-20 h-20 rounded-full flex items-center justify-center cursor-pointer shadow-xl hover:scale-110 transition-all" onclick="alert('请跟读：马（mǎ）')">
                    <i class="fas fa-microphone text-white text-3xl"></i>
                </button>
                <button class="bg-white/20 hover:bg-white/30 w-16 h-16 rounded-full flex items-center justify-center cursor-pointer transition-all" onclick="alert('慢速播放')">
                    <i class="fas fa-forward text-white text-2xl"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 朗读设置 -->
    <div class="px-6 mb-6">
        <div class="bg-white/10 backdrop-blur-md rounded-2xl p-4 border border-white/20">
            <h3 class="text-white font-bold mb-3">朗读设置</h3>
            <div class="space-y-3">
                <div class="flex items-center justify-between">
                    <span class="text-white/80">发音速度</span>
                    <div class="flex gap-2">
                        <button class="bg-white/20 text-white text-xs px-3 py-1 rounded-full">慢速</button>
                        <button class="bg-white/30 text-white text-xs px-3 py-1 rounded-full">标准</button>
                        <button class="bg-white/20 text-white text-xs px-3 py-1 rounded-full">快速</button>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-white/80">发音人</span>
                    <div class="flex gap-2">
                        <button class="bg-white/30 text-white text-xs px-3 py-1 rounded-full">女声</button>
                        <button class="bg-white/20 text-white text-xs px-3 py-1 rounded-full">男声</button>
                        <button class="bg-white/20 text-white text-xs px-3 py-1 rounded-full">童声</button>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-white/80">自动播放</span>
                    <div class="w-12 h-6 bg-green-500 rounded-full relative cursor-pointer">
                        <div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 汉字列表 -->
    <div class="px-6">
        <div class="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden border border-white/20">
            <div class="px-4 py-3 bg-white/5">
                <h3 class="text-white font-bold">选择要听的汉字</h3>
            </div>
            <div>
                <div class="char-list-item px-4 py-4 flex items-center justify-between cursor-pointer border-b border-white/10" onclick="alert('切换到：马')">
                    <div class="flex items-center gap-3">
                        <span class="text-4xl">🐴</span>
                        <div>
                            <div class="text-white text-xl font-bold">马</div>
                            <div class="text-white/60 text-sm">mǎ · 已练习</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="bg-green-500/50 text-white text-xs px-2 py-1 rounded">⭐⭐⭐</span>
                        <i class="fas fa-chevron-right text-white/50"></i>
                    </div>
                </div>
                <div class="char-list-item px-4 py-4 flex items-center justify-between cursor-pointer border-b border-white/10" onclick="alert('切换到：牛')">
                    <div class="flex items-center gap-3">
                        <span class="text-4xl">🐮</span>
                        <div>
                            <div class="text-white text-xl font-bold">牛</div>
                            <div class="text-white/60 text-sm">niú · 已练习</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="bg-green-500/50 text-white text-xs px-2 py-1 rounded">⭐⭐⭐</span>
                        <i class="fas fa-chevron-right text-white/50"></i>
                    </div>
                </div>
                <div class="char-list-item px-4 py-4 flex items-center justify-between cursor-pointer border-b border-white/10" onclick="alert('切换到：羊')">
                    <div class="flex items-center gap-3">
                        <span class="text-4xl">🐑</span>
                        <div>
                            <div class="text-white text-xl font-bold">羊</div>
                            <div class="text-white/60 text-sm">yáng · 学习中</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="bg-blue-500/50 text-white text-xs px-2 py-1 rounded">⭐⭐☆</span>
                        <i class="fas fa-chevron-right text-white/50"></i>
                    </div>
                </div>
                <div class="char-list-item px-4 py-4 flex items-center justify-between cursor-pointer" onclick="alert('切换到：鸟')">
                    <div class="flex items-center gap-3">
                        <span class="text-4xl">🐦</span>
                        <div>
                            <div class="text-white text-xl font-bold">鸟</div>
                            <div class="text-white/60 text-sm">niǎo · 未开始</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="bg-gray-500/50 text-white text-xs px-2 py-1 rounded">
                            <i class="fas fa-lock mr-1"></i>锁定
                        </span>
                        <i class="fas fa-chevron-right text-white/50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function navigateTo(page) {
            window.parent.postMessage({
                action: 'navigate',
                page: page
            }, '*');
        }
    </script>
</body>
</html>
