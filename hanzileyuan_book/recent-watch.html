<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最近观看</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #4a1d96 0%, #6b2fb5 50%, #8b4fd9 100%);
        }
        .video-card {
            transition: all 0.3s;
            backdrop-filter: blur(15px);
        }
        .video-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            transition: width 0.3s;
        }
    </style>
</head>
<body class="w-full min-h-screen overflow-auto pb-8">
    <!-- 状态栏 -->
    <div class="bg-black/30 backdrop-blur-sm px-6 py-2 flex justify-between items-center text-white text-sm sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
        </div>
        <div class="font-medium">10:24</div>
        <div class="flex items-center gap-2">
            <span>85%</span>
            <i class="fas fa-battery-three-quarters"></i>
        </div>
    </div>

    <!-- 返回按钮 -->
    <div class="absolute top-14 left-8 z-20">
        <button class="bg-gradient-to-br from-yellow-400 to-orange-500 w-16 h-16 rounded-full flex items-center justify-center cursor-pointer shadow-xl hover:scale-110 transition-all" onclick="navigateTo('watch.html')">
            <i class="fas fa-arrow-left text-white text-3xl"></i>
        </button>
    </div>

    <!-- 标题区域 -->
    <div class="px-6 py-8 text-center pt-24">
        <h1 class="text-4xl font-bold text-white mb-2">📺 最近观看</h1>
        <p class="text-white/80 text-lg">继续学习未完成的课程</p>
    </div>

    <!-- 视频列表 -->
    <div class="px-6 pb-8">
        <div class="grid grid-cols-2 gap-4 max-w-5xl mx-auto">
            <!-- 视频1 -->
            <div class="video-card bg-white/20 border border-white/30 rounded-2xl overflow-hidden cursor-pointer shadow-xl" onclick="navigateTo('video-player.html?video=马牛羊')">
                <div class="aspect-video bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center relative">
                    <span class="text-7xl">🐴</span>
                    <div class="absolute top-3 right-3 bg-black/50 text-white text-xs px-2 py-1 rounded">15:32</div>
                    <div class="absolute inset-0 bg-black/20 flex items-center justify-center">
                        <i class="fas fa-play-circle text-white text-6xl opacity-80"></i>
                    </div>
                </div>
                <div class="p-5">
                    <h3 class="text-white text-xl font-bold mb-2">第1课《马牛羊》</h3>
                    <p class="text-white/80 text-sm mb-3">学习马、牛、羊三个象形字</p>
                    <div class="progress-bar mb-2">
                        <div class="progress-fill" style="width: 80%"></div>
                    </div>
                    <div class="flex items-center justify-between text-white/70 text-xs">
                        <span>已观看 80%</span>
                        <span>2天前</span>
                    </div>
                </div>
            </div>

            <!-- 视频2 -->
            <div class="video-card bg-white/20 border border-white/30 rounded-2xl overflow-hidden cursor-pointer shadow-xl" onclick="navigateTo('video-player.html?video=木林森本末片')">
                <div class="aspect-video bg-gradient-to-br from-green-500 to-teal-600 flex items-center justify-center relative">
                    <span class="text-7xl">🌳</span>
                    <div class="absolute top-3 right-3 bg-black/50 text-white text-xs px-2 py-1 rounded">15:20</div>
                    <div class="absolute inset-0 bg-black/20 flex items-center justify-center">
                        <i class="fas fa-play-circle text-white text-6xl opacity-80"></i>
                    </div>
                </div>
                <div class="p-5">
                    <h3 class="text-white text-xl font-bold mb-2">第5课《木林森本末片》</h3>
                    <p class="text-white/80 text-sm mb-3">从一棵树到森林</p>
                    <div class="progress-bar mb-2">
                        <div class="progress-fill" style="width: 45%"></div>
                    </div>
                    <div class="flex items-center justify-between text-white/70 text-xs">
                        <span>已观看 45%</span>
                        <span>3天前</span>
                    </div>
                </div>
            </div>

            <!-- 视频3 -->
            <div class="video-card bg-white/20 border border-white/30 rounded-2xl overflow-hidden cursor-pointer shadow-xl" onclick="navigateTo('video-player.html?video=日月晶星')">
                <div class="aspect-video bg-gradient-to-br from-yellow-400 to-orange-500 flex items-center justify-center relative">
                    <span class="text-7xl">☀️</span>
                    <div class="absolute top-3 right-3 bg-black/50 text-white text-xs px-2 py-1 rounded">12:45</div>
                    <div class="absolute inset-0 bg-black/20 flex items-center justify-center">
                        <i class="fas fa-play-circle text-white text-6xl opacity-80"></i>
                    </div>
                </div>
                <div class="p-5">
                    <h3 class="text-white text-xl font-bold mb-2">第14课《日月晶星》</h3>
                    <p class="text-white/80 text-sm mb-3">天上的太阳和月亮</p>
                    <div class="progress-bar mb-2">
                        <div class="progress-fill" style="width: 20%"></div>
                    </div>
                    <div class="flex items-center justify-between text-white/70 text-xs">
                        <span>已观看 20%</span>
                        <span>5天前</span>
                    </div>
                </div>
            </div>

            <!-- 视频4 -->
            <div class="video-card bg-white/20 border border-white/30 rounded-2xl overflow-hidden cursor-pointer shadow-xl" onclick="navigateTo('video-player.html?video=鸡狗猪猫')">
                <div class="aspect-video bg-gradient-to-br from-blue-400 to-cyan-600 flex items-center justify-center relative">
                    <span class="text-7xl">🐕</span>
                    <div class="absolute top-3 right-3 bg-black/50 text-white text-xs px-2 py-1 rounded">14:10</div>
                    <div class="absolute inset-0 bg-black/20 flex items-center justify-center">
                        <i class="fas fa-play-circle text-white text-6xl opacity-80"></i>
                    </div>
                </div>
                <div class="p-5">
                    <h3 class="text-white text-xl font-bold mb-2">第2课《鸡狗猪猫》</h3>
                    <p class="text-white/80 text-sm mb-3">认识家养动物</p>
                    <div class="progress-bar mb-2">
                        <div class="progress-fill" style="width: 100%"></div>
                    </div>
                    <div class="flex items-center justify-between text-white/70 text-xs">
                        <span><i class="fas fa-check-circle mr-1"></i>已完成</span>
                        <span>7天前</span>
                    </div>
                </div>
            </div>

            <!-- 视频5 -->
            <div class="video-card bg-white/20 border border-white/30 rounded-2xl overflow-hidden cursor-pointer shadow-xl" onclick="navigateTo('video-player.html?video=水泉川州洲')">
                <div class="aspect-video bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center relative">
                    <span class="text-7xl">💧</span>
                    <div class="absolute top-3 right-3 bg-black/50 text-white text-xs px-2 py-1 rounded">13:30</div>
                    <div class="absolute inset-0 bg-black/20 flex items-center justify-center">
                        <i class="fas fa-play-circle text-white text-6xl opacity-80"></i>
                    </div>
                </div>
                <div class="p-5">
                    <h3 class="text-white text-xl font-bold mb-2">第8课《水泉川州洲》</h3>
                    <p class="text-white/80 text-sm mb-3">关于水的汉字</p>
                    <div class="progress-bar mb-2">
                        <div class="progress-fill" style="width: 65%"></div>
                    </div>
                    <div class="flex items-center justify-between text-white/70 text-xs">
                        <span>已观看 65%</span>
                        <span>1周前</span>
                    </div>
                </div>
            </div>

            <!-- 视频6 -->
            <div class="video-card bg-white/20 border border-white/30 rounded-2xl overflow-hidden cursor-pointer shadow-xl" onclick="navigateTo('video-player.html?video=人从众比北')">
                <div class="aspect-video bg-gradient-to-br from-pink-400 to-rose-600 flex items-center justify-center relative">
                    <span class="text-7xl">👨</span>
                    <div class="absolute top-3 right-3 bg-black/50 text-white text-xs px-2 py-1 rounded">11:50</div>
                    <div class="absolute inset-0 bg-black/20 flex items-center justify-center">
                        <i class="fas fa-play-circle text-white text-6xl opacity-80"></i>
                    </div>
                </div>
                <div class="p-5">
                    <h3 class="text-white text-xl font-bold mb-2">第23课《人从众比北》</h3>
                    <p class="text-white/80 text-sm mb-3">认识"人"字的变化</p>
                    <div class="progress-bar mb-2">
                        <div class="progress-fill" style="width: 30%"></div>
                    </div>
                    <div class="flex items-center justify-between text-white/70 text-xs">
                        <span>已观看 30%</span>
                        <span>2周前</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function navigateTo(page) {
            window.parent.postMessage({
                action: 'navigate',
                page: page
            }, '*');
        }
    </script>
</body>
</html>
